name: CD Pipeline for http and ws backend

on:
  push:
    branches: ["main"]

jobs:

  deploy:
    name: deploy to EC2
    runs-on: self-hosted

    steps:
      - name: deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd games
            git pull origin main
            bun install
            bun run generate:client
            pm2 restart 1 2
