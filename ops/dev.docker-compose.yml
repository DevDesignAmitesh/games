services:
  postgres:
    image: postgres:alpine
    ports:
      - 5432:5432
    environment:
      - POSTGRES_DB=games
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres

  redis:
    image: redis:alpine
    ports:
      - 6379:6379

  client:
    build:
      context: ..
      dockerfile: ./ops/client.dockerfile
    ports:
      - 3000:3000
    environment:
      - NEXT_PUBLIC_NODE_ENV=${NEXT_PUBLIC_NODE_ENV}

  ws:
    build:
      context: ..
      dockerfile: ./ops/ws.dockerfile
    ports:
      - 8080:8080
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=${REDIS_URL}

  http:
    build:
      context: ..
      dockerfile: ./ops/http.dockerfile
    ports:
      - 4000:4000
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=${REDIS_URL}
