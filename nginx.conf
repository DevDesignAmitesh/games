events {
    worker_connections 1024;
}

http {

    # Needed to safely handle WebSocket upgrades
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        server_name skribbl-be.amitesh.work;

        location / {
            proxy_pass http://localhost:8080;
            proxy_http_version 1.1;

            # WebSocket headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Standard reverse-proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket-friendly timeouts
            proxy_read_timeout 1d;
            proxy_send_timeout 1d;

            # Important for WS
            proxy_buffering off;
        }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/skribbl-be.amitesh.work/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/skribbl-be.amitesh.work/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
